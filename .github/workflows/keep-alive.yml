name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘執行一次
  workflow_dispatch:           # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EPBOX website
        run: |
          curl -s -o /dev/null -w "主站 HTTP Status: %{http_code}\n" https://epbox-line-bot.onrender.com
          curl -s -o /dev/null -w "後台 HTTP Status: %{http_code}\n" https://epbox-line-bot.onrender.com/epbox-analytics.html
          echo "Ping sent at $(date '+%Y-%m-%d %H:%M:%S UTC')"
